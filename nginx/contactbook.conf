# Produkční nginx konfigurace pro ContactBook
# Před nasazením: nahradit YOUR_DOMAIN.COM skutečnou doménou
# Pak spustit: certbot --nginx -d YOUR_DOMAIN.COM

server {
    listen 80;
    server_name YOUR_DOMAIN.COM 188.245.190.72;

    # ACME challenge pro Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Přesměrování na HTTPS (zapnout po získání certifikátu)
    # return 301 https://$host$request_uri;

    # Dočasně — přímý přístup přes HTTP pro vývoj/testování
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

